<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Time Keepr | Alta Relojoaria</title>
    <meta name="description" content="Relógios exclusivos para pessoas que dominam o próprio tempo.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Montserrat:wght@200;300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           VARIÁVEIS E RESET
        ========================================= */
        :root {
            --gold: #D4AF37;
            --bg-dark: #050505;
            --surface: rgba(25, 25, 25, 0.6);
            --text-main: #E0E0E0;
            --text-muted: #888888;
            --danger: #FF3B30;
            --success: #34C759;
            --transition: 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* =========================================
           HEADER E NAVEGAÇÃO
        ========================================= */
        header {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            transition: transform 0.3s ease;
        }
        header.scrolled { padding: 15px 5%; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .logo { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 800; color: var(--gold); letter-spacing: 4px; cursor: pointer; }
        
        .btn-cart {
            background: transparent; color: var(--gold); border: 1px solid var(--gold);
            padding: 10px 20px; border-radius: 2px; font-weight: 600; font-size: 0.85rem;
            cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px;
        }
        .btn-cart:hover { background: var(--gold); color: var(--bg-dark); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }

        /* =========================================
           SCENES E ANIMAÇÕES
        ========================================= */
        .scene { display: none; opacity: 0; min-height: 100vh; padding-top: 80px; }
        .scene.active { display: block; animation: fadeInScene 0.6s ease forwards; }
        @keyframes fadeInScene { to { opacity: 1; } }

        .btn-primary {
            background: var(--gold); color: var(--bg-dark); padding: 18px 40px; border: none;
            font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1rem; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; transition: var(--transition); border-radius: 2px;
            position: relative; overflow: hidden;
        }
        .btn-primary::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-25deg); transition: 0.5s;
        }
        .btn-primary:hover::after { left: 150%; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }

        /* =========================================
           HOME HERO
        ========================================= */
        .hero {
            height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, var(--bg-dark) 100%), url('https://images.unsplash.com/photo-1523170335258-f5ed11844a49?q=80&w=2000&auto=format&fit=crop') center/cover fixed;
        }
        .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 5rem); color: var(--white); text-shadow: 0 5px 20px rgba(0,0,0,0.8); margin-bottom: 20px; }
        .hero h1 span { color: var(--gold); }
        .hero p { color: var(--text-muted); font-size: 1.2rem; font-weight: 300; max-width: 600px; margin-bottom: 40px; letter-spacing: 1px; }

        /* =========================================
           CATÁLOGO DE PRODUTOS E ABAS (TABS)
        ========================================= */
        .catalog-container { padding: 80px 5%; max-width: 1400px; margin: 0 auto; }
        .section-title { text-align: center; margin-bottom: 40px; }
        .section-title h2 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--gold); margin-bottom: 10px; }
        .section-title p { color: var(--text-muted); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 0.8rem; }

        .category-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 50px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-muted); padding: 12px 30px; border-radius: 30px; cursor: pointer; transition: var(--transition); font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 1.5px; font-size: 0.85rem; font-weight: 600; outline: none; }
        .tab-btn.active, .tab-btn:hover { background: var(--gold); color: var(--bg-dark); border-color: var(--gold); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; }
        
        .card { background: var(--surface); border: 1px solid rgba(255,255,255,0.03); border-radius: 4px; padding: 20px; transition: var(--transition); position: relative; overflow: hidden; backdrop-filter: blur(10px); display: flex; flex-direction: column; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card:hover { border-color: rgba(212, 175, 55, 0.4); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .card-img-wrap { height: 280px; overflow: hidden; border-radius: 4px; margin-bottom: 20px; cursor: pointer; position: relative; background: #111;}
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .card:hover .card-img-wrap img { transform: scale(1.08); }
        
        .tag-stock { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: var(--gold); padding: 5px 10px; font-size: 0.7rem; font-weight: 800; border: 1px solid var(--gold); border-radius: 2px; z-index: 2;}

        .card-title { font-family: 'Cinzel', serif; font-size: 1.1rem; color: var(--white); margin-bottom: 5px; flex-grow: 1; line-height: 1.3;}
        .card-price { font-size: 1.5rem; color: var(--gold); font-weight: 600; margin-bottom: 20px; }
        
        .btn-outline { width: 100%; padding: 15px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--white); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: var(--transition); border-radius: 2px; }
        .btn-outline:hover { background: var(--gold); border-color: var(--gold); color: var(--bg-dark); }

        /* =========================================
           PÁGINA DO PRODUTO (DETALHES)
        ========================================= */
        .product-view { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding: 40px 5%; max-width: 1400px; margin: 0 auto; align-items: center; }
        .product-gallery img { width: 100%; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .product-details h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; color: var(--gold); line-height: 1.1; margin-bottom: 20px; }
        .product-details .desc { color: var(--text-muted); font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; font-weight: 300; }
        .product-details .price { font-size: 3rem; font-weight: 200; color: var(--white); margin-bottom: 40px; }
        
        .urgency-box { background: rgba(255, 59, 48, 0.1); border-left: 3px solid var(--danger); padding: 15px; margin-bottom: 30px; }
        .urgency-box p { color: var(--danger); font-size: 0.9rem; font-weight: 600; }

        .btn-back { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; margin: 20px 5%; display: flex; align-items: center; gap: 10px; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;}
        .btn-back:hover { color: var(--gold); }

        /* =========================================
           CARRINHO E SIDEBAR
        ========================================= */
        #cart-drawer { position: fixed; top: 0; right: -100%; width: 450px; height: 100vh; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); box-shadow: -10px 0 30px rgba(0,0,0,0.8); border-left: 1px solid rgba(212,175,55,0.2); z-index: 2000; transition: right 0.5s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; padding: 30px; }
        #cart-drawer.open { right: 0; }
        #cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); z-index: 1999; opacity: 0; visibility: hidden; transition: 0.4s; }
        #cart-overlay.open { opacity: 1; visibility: visible; }

        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px;}
        .cart-header h2 { font-family: 'Cinzel', serif; color: var(--gold); }
        .close-btn { background: none; border: none; color: var(--text-muted); font-size: 2rem; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { color: var(--danger); transform: rotate(90deg); }

        .shipping-tracker { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 4px; margin-bottom: 20px; text-align: center; }
        .shipping-text { font-size: 0.85rem; font-weight: 600; margin-bottom: 10px; color: var(--text-main); }
        .shipping-text span { color: var(--gold); }
        .progress-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.8s ease; }
        .progress-fill.success { background: var(--success); }

        .cart-items { flex-grow: 1; overflow-y: auto; padding-right: 10px; }
        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; border: 1px solid transparent; transition: 0.3s;}
        .cart-item:hover { border-color: rgba(255,255,255,0.1); }
        .cart-item img { width: 70px; height: 70px; object-fit: cover; border-radius: 2px; }
        .cart-item-info { flex-grow: 1; }
        .cart-item-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }
        .cart-item-price { color: var(--gold); font-size: 0.9rem; font-weight: 800; }
        .remove-item { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; text-decoration: underline; margin-top: 5px; }
        .remove-item:hover { color: var(--danger); }

        .cart-footer { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .cart-total-row { display: flex; justify-content: space-between; font-size: 1.2rem; margin-bottom: 20px; align-items: center;}
        .cart-total-val { font-size: 1.8rem; font-weight: 800; color: var(--gold); }

        .btn-whatsapp { width: 100%; padding: 18px; background: #25D366; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: var(--transition); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2); }
        .btn-whatsapp:hover { background: #1EBE5D; transform: translateY(-2px); box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4); }
        .btn-whatsapp:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

        /* =========================================
           TOAST NOTIFICATIONS
        ========================================= */
        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid rgba(212,175,55,0.3); color: var(--white); padding: 15px 20px; border-radius: 4px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateX(-150%); opacity: 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast.show { transform: translateX(0); opacity: 1; }
        .toast-icon { width: 30px; height: 30px; background: var(--gold); color: var(--bg-dark); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; }

        /* =========================================
           RESPONSIVIDADE (MOBILE)
        ========================================= */
        @media (max-width: 768px) {
            .product-view { grid-template-columns: 1fr; gap: 30px; padding-top: 20px; }
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1rem; padding: 0 20px; }
            #cart-drawer { width: 100%; right: -100%; }
            .product-details h1 { font-size: 2.2rem; }
            
            .category-tabs { gap: 8px; }
            .tab-btn { padding: 8px 15px; font-size: 0.75rem; }
            
            /* GRID 2x2 MOBILE */
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .card { padding: 10px; }
            .card-img-wrap { height: 150px; margin-bottom: 12px; }
            .card-title { font-size: 0.8rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }
            .card-price { font-size: 1rem; margin-bottom: 10px; }
            .tag-stock { font-size: 0.6rem; padding: 3px 6px; }
            .btn-outline { padding: 8px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="logo" onclick="app.navigate('home')">TIME KEEPR</div>
        <button class="btn-cart" onclick="app.toggleCart()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span id="cart-counter">0</span>
        </button>
    </header>

    <main>
        <div id="scene-home" class="scene active">
            <section class="hero">
                <h1>O Seu Tempo<br><span>Vale Ouro</span></h1>
                <p>Relógios projetados para homens e mulheres que não seguem tendências, mas as criam.</p>
                <button class="btn-primary" onclick="app.navigate('catalog')">Acessar Coleção</button>
            </section>
        </div>

        <div id="scene-catalog" class="scene">
            <div class="catalog-container">
                <div class="section-title">
                    <h2>Coleção Legacy 2026</h2>

                </div>
                
                <div class="category-tabs">
                    <button class="tab-btn active" onclick="app.filterCatalog('ALL', this)">Ver Todos</button>
                    <button class="tab-btn" onclick="app.filterCatalog('M', this)">Masculinos</button>
                    <button class="tab-btn" onclick="app.filterCatalog('F', this)">Femininos</button>
                </div>

                <div class="grid" id="catalog-grid">
                    </div>
            </div>
        </div>

        <div id="scene-product" class="scene">
            <button class="btn-back" onclick="app.navigate('catalog')">

                Voltar ao Catálogo
            </button>
            <div class="product-view" id="product-view-container">
                </div>
        </div>
    </main>

    <div id="cart-overlay" onclick="app.toggleCart()"></div>
    <aside id="cart-drawer">
        <div class="cart-header">
            <h2>Seu Acervo</h2>
            <button class="close-btn" onclick="app.toggleCart()">&times;</button>
        </div>

        <div class="shipping-tracker">
            <div class="shipping-text" id="shipping-msg">Adicione <span>R$ 500,00</span> para Frete Grátis</div>
            <div class="progress-bar">
                <div class="progress-fill" id="shipping-progress"></div>
            </div>
        </div>

        <div class="cart-items" id="cart-items-list"></div>

        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Total Estimado</span>
                <span class="cart-total-val" id="cart-total-value">R$ 0,00</span>
            </div>
            <button class="btn-whatsapp" id="btn-checkout" onclick="app.checkout()" disabled>
                Finalizar no WhatsApp
            </button>
        </div>
    </aside>

    <div id="toast-container"></div>

                { id: 103, name: "Crrju Matrix 5018", price: 139.90, img: "https://http2.mlstatic.com/D_Q_NP_665008-MLB107600586966_032026-L.webp", stock: 10, gender: 'M', desc: "Eleve seu visual com o Crrju Matrix 5018. Um relógio imponente, com ponteiros luminosos e calendário funcional. Estilo premium para todas as ocasiões." },
                { id: 104, name: "Oceanic Precision", price: 129.90, img: "https://elitewatchess.com/cdn/shop/files/poedagar-luxury-man-quartz-watch-sport-military-watch-for-men-waterproof-luminous-date-chronograph-stainless-steel-mens-970silverblue-white-6708755068469-large.jpg?v=1730744319", stock: 10, gender: 'M', desc: "Descrição para o novo relógio masculino aqui." },
                { id: 105, name: "Binbond Denton", price: 134.90, img: "https://http2.mlstatic.com/D_NQ_NP_971558-MLA91919254438_092025-O.webp", stock: 10, gender: 'M', desc: "Sofisticação em cada detalhe e presença marcante para o homem moderno. O equilíbrio perfeito entre luxo e precisão." },
                

                // === FEMININOS ===
                { id: 11, name: "Classic OPK", price: 179.90, img: "https://down-br.img.susercontent.com/file/br-11134207-7r98p-lmwtr0fa64ty24", stock: 3, gender: 'F', desc: "Simplicidade e charme. Uma joia atemporal que realça a beleza e a delicadeza do pulso feminino em qualquer ocasião." },
                { id: 12, name: "Royal Rose Gold", price: 119.90, img: "https://down-br.img.susercontent.com/file/sg-11134301-7rast-mack7ohsh81v13", stock: 6, gender: 'F', desc: "Brilho e sofisticação em ouro rosé. Mostrador texturizado que transborda feminilidade e elegância absoluta." },
                { id: 13, name: "Chronos Black Edition", price: 99.90, img: "https://down-br.img.susercontent.com/file/sg-11134301-7rasp-macnoa7i6gyjff", stock: 20, gender: 'F', desc: "Para mulheres de atitude. O preto fosco entrega um visual contemporâneo, ousado e cheio de empoderamento." },
                { id: 14, name: "Executive Gold", price: 139.90, img: "https://http2.mlstatic.com/D_Q_NP_789894-CBT87461640011_072025-O.webp", stock: 5, gender: 'F', desc: "Feito para a mulher líder. Detalhes em dourado que transmitem confiança, sucesso e autoridade no ambiente corporativo." },
                { id: 15, name: "Minimalist Steel", price: 49.90, img: "https://a-static.mlcdn.com.br/%7Bw%7Dx%7Bh%7D/relogio-feminino-moda-pequena-arabe-relogios-de-quartzo-pulseira-de-couro-relogios-de-pulso-none/aliexpress/207225178/07f97f54c977bc9de18e9f3fb185c86a.jpeg", stock: 18, gender: 'F', desc: "O clássico feminino reinventado. Caixa pequena e pulseira delicada, ideal para mulheres que amam a discrição luxuosa." },
                { id: 16, name: "Phantom Carbon", price: 99.90, img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgNhWcWuRZXGx2tloexYXq0dWWf_ys_hk3T5wlRs8hqrTrDMg5", stock: 10, gender: 'F', desc: "Leveza e modernidade. Um design imponente que une força e sofisticação para o dia a dia da mulher contemporânea." },
                
                // --- NOVOS 10 ESPAÇOS FEMININOS ---
                { id: 201, name: "Saint Germain chelsea Gold", price: 209.90, img: "https://acdn-us.mitiendanube.com/stores/001/116/055/products/dourado-32mm-b-frente-site1-c12a4dc3e8c4f1aeee16339562806579-640-0.webp", stock: 10, gender: 'F', desc: " definição de sofisticação em cada segundo. ✨ O brilho do ouro encontra o design atemporal da Saint Germain para quem não abre mão do extraordinário. Sinta o poder de um acessório que fala por si." },
                { id: 202, name: "Saint Germain Harlem Silver", price: 169.90, img: "https://acdn-us.mitiendanube.com/stores/001/116/055/products/prata-32mm-b-frente-site1-c61b59639ae96d1dad16339564289314-640-0.webp", stock: 10, gender: 'F', desc: "Um clássico contemporâneo para acompanhar cada segundo do meu dia. ⏱️ Prateado, versátil e essencial." },
               
            ];

            let cart = [];
            let currentFilter = 'ALL';

            const formatBRL = (value) => {
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
            };

            const getProductById = (id) => products.find(p => p.id === id);

            const filterCatalog = (gender, btnElement) => {
                currentFilter = gender;
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                if (btnElement) btnElement.classList.add('active');
                renderCatalog();
            };

            const renderCatalog = () => {
                const grid = document.getElementById('catalog-grid');
                const filteredProducts = currentFilter === 'ALL' ? products : products.filter(p => p.gender === currentFilter);

                if(filteredProducts.length === 0) {
                    grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; color: #888; font-size: 1.2rem; margin-top: 40px;">Nenhum modelo encontrado.</p>';
                    return;
                }

                grid.innerHTML = filteredProducts.map(p => `
                    <div class="card">
                        <div class="tag-stock">Restam ${p.stock}</div>
                        <div class="card-img-wrap" onclick="app.viewProduct(${p.id})">
                            <img src="${p.img}" alt="${p.name}" loading="lazy">
                        </div>
                        <h3 class="card-title">${p.name}</h3>
                        <div class="card-price">${formatBRL(p.price)}</div>
                        <button class="btn-outline" onclick="app.addToCart(${p.id})">Adicionar</button>
                    </div>
                `).join('');
            };

            const viewProduct = (id) => {
                const p = getProductById(id);
                const container = document.getElementById('product-view-container');
                container.innerHTML = `
                    <div class="product-gallery">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="product-details">
                        <div class="urgency-box">
                            <p>🔥 Alta Demanda! Apenas ${p.stock} unidades no estoque.</p>
                        </div>
                        <h1>${p.name}</h1>
                        <p class="desc">${p.desc}</p>
                        <div class="price">${formatBRL(p.price)}</div>
                        <button class="btn-primary" style="width: 100%;" onclick="app.addToCart(${p.id})">
                            Reservar Esta Peça Agora
                        </button>
                        <ul style="margin-top: 30px; color: #888; font-size: 0.9rem; list-style: none; line-height: 2;">
                            <li>✓ Garantia Time Keepr</li>
                            <li>✓ Pagamento Seguro via WhatsApp</li>
                            <li>✓ Envio Imediato para todo o país</li>
                        </ul>
                    </div>
                `;
                navigate('product');
            };

            const updateCartUI = () => {
                document.getElementById('cart-counter').innerText = cart.length;
                const list = document.getElementById('cart-items-list');
                
                if (cart.length === 0) {
                    list.innerHTML = '<p style="color: #666; text-align: center; margin-top: 50px;">Seu carrinho está vazio.</p>';
                } else {
                    list.innerHTML = cart.map((item, index) => `
                        <div class="cart-item">
                            <img src="${item.img}" alt="${item.name}">
                            <div class="cart-item-info">
                                <div class="cart-item-title">${item.name}</div>
                                <div class="cart-item-price">${formatBRL(item.price)}</div>
                                <button class="remove-item" onclick="app.removeFromCart(${index})">Remover</button>
                            </div>
                        </div>
                    `).join('');
                }

                const total = cart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('cart-total-value').innerText = formatBRL(total);

                const progressBar = document.getElementById('shipping-progress');
                const msgBox = document.getElementById('shipping-msg');
                let percent = (total / FREE_SHIPPING_THRESHOLD) * 100;

                if (total >= FREE_SHIPPING_THRESHOLD) {
                    progressBar.style.width = '100%';
                    progressBar.classList.add('success');
                    msgBox.innerHTML = '<span style="color: var(--success);">✓ Você ganhou Frete Grátis!</span>';
                } else {
                    progressBar.style.width = `${percent}%`;
                    progressBar.classList.remove('success');
                    msgBox.innerHTML = `Adicione <span>${formatBRL(FREE_SHIPPING_THRESHOLD - total)}</span> para Frete Grátis`;
                }

                document.getElementById('btn-checkout').disabled = cart.length === 0;
            };

            const addToCart = (id) => {
                const product = getProductById(id);
                cart.push(product);
                updateCartUI();
                showToast(`"${product.name}" adicionado.`);
                if (!document.getElementById('cart-drawer').classList.contains('open')) {
                    toggleCart();
                }
            };

            const removeFromCart = (index) => {
                cart.splice(index, 1);
                updateCartUI();
            };

            const toggleCart = () => {
                document.getElementById('cart-drawer').classList.toggle('open');
                document.getElementById('cart-overlay').classList.toggle('open');
            };

            const checkout = () => {
                if (cart.length === 0) return;
                
                let text = "⌚ *NOVO PEDIDO | TIME KEEPR* ⌚\n\n";
                cart.forEach((item, i) => text += `${i + 1}. *${item.name}* - ${formatBRL(item.price)}\n`);

                const total = cart.reduce((sum, item) => sum + item.price, 0);
                text += `\n*VALOR TOTAL:* ${formatBRL(total)}\n`;
                if(total >= FREE_SHIPPING_THRESHOLD) text += "📦 _*Frete Grátis Aplicado!*_\n";

                window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`, '_blank');
            };

            const navigate = (sceneId, pushState = true) => {
                document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
                document.getElementById(`scene-${sceneId}`).classList.add('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (document.getElementById('cart-drawer').classList.contains('open')) toggleCart();
                
                if (pushState) {
                    window.history.pushState({ scene: sceneId }, '', `#${sceneId}`);
                }
            };

            const showToast = (message) => {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<div class="toast-icon">✓</div><div>${message}</div>`;
                container.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 500); }, 3000);
            };

            const handleScroll = () => {
                const header = document.getElementById('main-header');
                window.scrollY > 50 ? header.classList.add('scrolled') : header.classList.remove('scrolled');
            };

            const init = () => {
                renderCatalog();
                updateCartUI();
                window.addEventListener('scroll', handleScroll);
                
                window.history.replaceState({ scene: 'home' }, '', '#home');
                
                window.addEventListener('popstate', (event) => {
                    if (event.state && event.state.scene) {
                        navigate(event.state.scene, false);
                    } else {
                        navigate('home', false);
                    }
                });
            };

            return { init, navigate, addToCart, removeFromCart, toggleCart, viewProduct, checkout, filterCatalog };
        })();

        window.addEventListener('DOMContentLoaded', app.init);
    </script>
</body>
</html>
